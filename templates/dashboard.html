<!DOCTYPE html>
<html>

<head>
<title>NIFTY AI Dashboard</title>
<meta http-equiv="refresh" content="900">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
}

.value{
font-size:20px;
margin:10px;
}

.trend{
font-size:35px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>NIFTY AI Trading Dashboard</h1>

<div class="container">

<div class="grid">

<!-- LEFT SIDE SIGNAL -->

<div class="card">

<h2>Market Signal</h2>

<div class="value">Price : {{price}}</div>
<div class="value">EMA20 : {{ema20}}</div>
<div class="value">EMA50 : {{ema50}}</div>
<div class="value">RSI : {{rsi}}</div>
<div class="value">+DI : {{di_plus}}</div>
<div class="value">-DI : {{di_minus}}</div>
<div class="value">DX : {{dx}}</div>
<div class="value" style="color: {{color}};">TREND : {{trend}}</div>
<div class="value" style="font-weight:bold;">Suggested Strategy : {{suggested_strategy}}</div>

<br>

<div class="trend" style="color:{{color}}">
{{trend}}
</div>

</div>


</div>

</div>



</body>
</html>
